<svg viewBox="0 0 500 540" xmlns="http://www.w3.org/2000/svg" width="500" height="540">
  <defs>
    <style>
      .nucleus-halo { animation: nPulse 3s ease-in-out infinite; transform-origin: 250px 250px; }
      .nucleus-core { animation: nPulse 3s ease-in-out infinite; transform-origin: 250px 250px; }
      @keyframes nPulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.8; transform: scale(1.12); }
      }
      .name-glow { animation: nameGlow 3s ease-in-out infinite; }
      @keyframes nameGlow {
        0%,100% { opacity: 0.85; }
        50%      { opacity: 1; }
      }
    </style>

    <!-- Filters -->
    <filter id="eglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="nucGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#ffaa44"/>
      <stop offset="70%"  stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#991100"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff6600" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#66e0ff"/>
      <stop offset="100%" stop-color="#006699"/>
    </radialGradient>

    <!--
      Orbit paths (absolute coords, centered at 250,250, rx=165, ry=58):
      A → rotation   0°  endpoints: (415,250)       (85,250)
      B → rotation  60°  endpoints: (332.5,392.87)  (167.5,107.13)
      C → rotation 120°  endpoints: (167.5,392.87)  (332.5,107.13)
    -->
    <path id="pathA" d="M 415,250 A 165,58 0 0 1 85,250 A 165,58 0 0 1 415,250"/>
    <path id="pathB" d="M 332.5,392.87 A 165,58 60 0 1 167.5,107.13 A 165,58 60 0 1 332.5,392.87"/>
    <path id="pathC" d="M 167.5,392.87 A 165,58 120 0 1 332.5,107.13 A 165,58 120 0 1 167.5,392.87"/>
  </defs>

  <!-- Background -->
  <rect width="500" height="540" fill="#0d1117" rx="20"/>

  <!-- Stars -->
  <circle cx="45"  cy="55"  r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="460" cy="75"  r="1"   fill="#fff" opacity="0.2"/>
  <circle cx="30"  cy="390" r="1.5" fill="#fff" opacity="0.2"/>
  <circle cx="470" cy="420" r="1"   fill="#fff" opacity="0.25"/>
  <circle cx="200" cy="28"  r="1"   fill="#fff" opacity="0.2"/>
  <circle cx="420" cy="38"  r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="485" cy="240" r="0.9" fill="#fff" opacity="0.2"/>
  <circle cx="14"  cy="190" r="0.9" fill="#fff" opacity="0.2"/>
  <circle cx="350" cy="450" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="88"  cy="445" r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="130" cy="22"  r="0.8" fill="#fff" opacity="0.15"/>
  <circle cx="380" cy="480" r="0.8" fill="#fff" opacity="0.15"/>

  <!-- ── STATIC ORBIT RINGS ── -->
  <use href="#pathA" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.14"/>
  <use href="#pathB" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.14"/>
  <use href="#pathC" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.14"/>

  <!-- ── ORBIT TRAIL A ── -->
  <use href="#pathA" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.55"
    stroke-dasharray="140 700">
    <animate attributeName="stroke-dashoffset" from="0" to="-840" dur="5s" repeatCount="indefinite"/>
  </use>

  <!-- ── ORBIT TRAIL B ── -->
  <use href="#pathB" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.55"
    stroke-dasharray="140 700">
    <animate attributeName="stroke-dashoffset" from="0" to="-840" dur="8s" repeatCount="indefinite"/>
  </use>

  <!-- ── ORBIT TRAIL C ── -->
  <use href="#pathC" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.55"
    stroke-dasharray="140 700">
    <animate attributeName="stroke-dashoffset" from="0" to="-840" dur="11s" repeatCount="indefinite"/>
  </use>

  <!-- ── ELECTRON A ── follows pathA -->
  <circle cx="0" cy="0" r="10" fill="url(#eGrad)" filter="url(#eglow)">
    <animateMotion dur="5s" repeatCount="indefinite" rotate="none">
      <mpath href="#pathA"/>
    </animateMotion>
  </circle>

  <!-- ── ELECTRON B ── follows pathB -->
  <circle cx="0" cy="0" r="10" fill="url(#eGrad)" filter="url(#eglow)">
    <animateMotion dur="8s" repeatCount="indefinite" rotate="none">
      <mpath href="#pathB"/>
    </animateMotion>
  </circle>

  <!-- ── ELECTRON C ── follows pathC -->
  <circle cx="0" cy="0" r="10" fill="url(#eGrad)" filter="url(#eglow)">
    <animateMotion dur="11s" repeatCount="indefinite" rotate="none">
      <mpath href="#pathC"/>
    </animateMotion>
  </circle>

  <!-- ── NUCLEUS HALO ── -->
  <circle cx="250" cy="250" r="62" fill="url(#haloGrad)" class="nucleus-halo"/>

  <!-- ── NUCLEUS CORE ── -->
  <circle cx="250" cy="250" r="28" fill="url(#nucGrad)" filter="url(#nglow)" class="nucleus-core"/>

  <!-- Nucleus inner shine -->
  <circle cx="242" cy="241" r="9" fill="white" opacity="0.15"/>

  <!-- ── NAME ── -->
  <text
    x="250" y="496"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    font-weight="700"
    letter-spacing="6"
    fill="#00d4ff"
    filter="url(#textglow)"
    class="name-glow">NATHAN PARANHOS</text>

  <!-- Subtle separator line under name -->
  <line x1="120" y1="505" x2="380" y2="505" stroke="#00d4ff" stroke-width="0.7" opacity="0.25"/>
</svg>
